<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark-blue">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hichem Bousaada — premium digital portfolio for web development, Android applications, graphic design, presentations and creative services." />
  <meta name="theme-color" content="#07111f" />
  <title>Hichem Bousaada | Digital Creator & Web Developer</title>

  <!-- Fonts: modern Latin + Arabic pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <!-- Professional icon set -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* =========================================================
       1) THEME TOKENS
       Switch by changing html[data-theme]
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --font-latin: "Inter", "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-arabic: "Cairo", "Tajawal", Tahoma, Arial, sans-serif;
      --radius-xs: 12px;
      --radius-sm: 16px;
      --radius-md: 22px;
      --radius-lg: 32px;
      --radius-full: 999px;
      --shadow-soft: 0 24px 80px rgba(0,0,0,.35);
      --transition: 260ms cubic-bezier(.2,.8,.2,1);
      --wa: #25D366;
      --facebook: #1877F2;
      --email: #38BDF8;
    }

    html[data-theme="dark-blue"] {
      --bg: #07111f;
      --bg-2: #0b1220;
      --surface: rgba(15, 23, 42, .72);
      --surface-2: rgba(17, 34, 64, .72);
      --text: #F8FAFC;
      --text-2: #CBD5E1;
      --muted: #94A3B8;
      --border: rgba(148, 163, 184, .18);
      --primary: #38BDF8;
      --secondary: #6366F1;
      --accent: #22D3EE;
      --glow: rgba(56, 189, 248, .28);
      --glow-2: rgba(99, 102, 241, .24);
      --hero-gradient: radial-gradient(circle at 20% 20%, rgba(56,189,248,.24), transparent 35%), radial-gradient(circle at 80% 25%, rgba(99,102,241,.22), transparent 38%), linear-gradient(135deg, #07111f 0%, #0b1220 52%, #0a1a2f 100%);
    }

    html[data-theme="purple-neon"] {
      --bg: #0e071a;
      --bg-2: #160b2f;
      --surface: rgba(31, 18, 54, .76);
      --surface-2: rgba(48, 20, 76, .72);
      --text: #FFF7FF;
      --text-2: #E9D5FF;
      --muted: #C4B5FD;
      --border: rgba(216, 180, 254, .18);
      --primary: #D946EF;
      --secondary: #8B5CF6;
      --accent: #22D3EE;
      --glow: rgba(217, 70, 239, .34);
      --glow-2: rgba(139, 92, 246, .30);
      --hero-gradient: radial-gradient(circle at 20% 20%, rgba(217,70,239,.26), transparent 36%), radial-gradient(circle at 80% 25%, rgba(34,211,238,.18), transparent 38%), linear-gradient(135deg, #0e071a 0%, #160b2f 50%, #260b45 100%);
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg: #F8FAFC;
      --bg-2: #EEF2FF;
      --surface: rgba(255, 255, 255, .80);
      --surface-2: rgba(255, 255, 255, .92);
      --text: #0F172A;
      --text-2: #334155;
      --muted: #64748B;
      --border: rgba(15, 23, 42, .12);
      --primary: #2563EB;
      --secondary: #7C3AED;
      --accent: #0891B2;
      --glow: rgba(37, 99, 235, .18);
      --glow-2: rgba(124, 58, 237, .16);
      --hero-gradient: radial-gradient(circle at 18% 18%, rgba(37,99,235,.16), transparent 34%), radial-gradient(circle at 80% 22%, rgba(124,58,237,.13), transparent 36%), linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 52%, #ECFEFF 100%);
      --shadow-soft: 0 24px 80px rgba(15,23,42,.14);
    }


    /* Additional daytime themes */
    html[data-theme="light-sky"] {
      color-scheme: light;
      --bg: #F0F9FF;
      --bg-2: #E0F2FE;
      --surface: rgba(255, 255, 255, .82);
      --surface-2: rgba(255, 255, 255, .94);
      --text: #082F49;
      --text-2: #075985;
      --muted: #0E7490;
      --border: rgba(14, 116, 144, .16);
      --primary: #0284C7;
      --secondary: #2563EB;
      --accent: #06B6D4;
      --glow: rgba(2, 132, 199, .18);
      --glow-2: rgba(6, 182, 212, .16);
      --hero-gradient: radial-gradient(circle at 18% 18%, rgba(14,165,233,.20), transparent 34%), radial-gradient(circle at 78% 24%, rgba(37,99,235,.14), transparent 36%), linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 48%, #ECFEFF 100%);
      --shadow-soft: 0 24px 80px rgba(8,47,73,.14);
    }

    html[data-theme="light-mint"] {
      color-scheme: light;
      --bg: #F0FDF4;
      --bg-2: #ECFDF5;
      --surface: rgba(255, 255, 255, .84);
      --surface-2: rgba(255, 255, 255, .94);
      --text: #052E16;
      --text-2: #166534;
      --muted: #047857;
      --border: rgba(5, 150, 105, .16);
      --primary: #059669;
      --secondary: #0D9488;
      --accent: #22C55E;
      --glow: rgba(5, 150, 105, .18);
      --glow-2: rgba(13, 148, 136, .15);
      --hero-gradient: radial-gradient(circle at 18% 18%, rgba(34,197,94,.18), transparent 34%), radial-gradient(circle at 80% 24%, rgba(20,184,166,.14), transparent 36%), linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 50%, #F7FEE7 100%);
      --shadow-soft: 0 24px 80px rgba(5,46,22,.13);
    }

    html[data-theme="light-sunset"] {
      color-scheme: light;
      --bg: #FFF7ED;
      --bg-2: #FFFBEB;
      --surface: rgba(255, 255, 255, .84);
      --surface-2: rgba(255, 255, 255, .95);
      --text: #431407;
      --text-2: #7C2D12;
      --muted: #9A3412;
      --border: rgba(234, 88, 12, .16);
      --primary: #F97316;
      --secondary: #E11D48;
      --accent: #F59E0B;
      --glow: rgba(249, 115, 22, .18);
      --glow-2: rgba(225, 29, 72, .14);
      --hero-gradient: radial-gradient(circle at 18% 18%, rgba(249,115,22,.18), transparent 34%), radial-gradient(circle at 80% 24%, rgba(225,29,72,.12), transparent 36%), linear-gradient(135deg, #FFF7ED 0%, #FFFBEB 50%, #FFF1F2 100%);
      --shadow-soft: 0 24px 80px rgba(67,20,7,.13);
    }

    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-latin);
      font-size: clamp(15px, .95vw, 16px);
      line-height: 1.7;
      transition: background .35s ease, color .35s ease;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    [dir="rtl"] body { font-family: var(--font-arabic); }
    [dir="rtl"] { text-align: right; }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }
    section { position: relative; padding: clamp(76px, 9vw, 120px) 24px; scroll-margin-top: 92px; }
    p, li, a, button, input, textarea, label, select { line-height: 1.7; }
    h1, h2, h3 { line-height: 1.12; letter-spacing: -.025em; text-wrap: balance; }
    p { overflow-wrap: anywhere; }

    ::selection { background: var(--primary); color: white; }
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--secondary)); border-radius: var(--radius-full); }

    .container { width: min(1180px, 100%); margin-inline: auto; }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .section-header { text-align: center; max-width: 760px; margin: 0 auto clamp(38px, 6vw, 66px); }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 9px;
      color: var(--primary); font-size: clamp(.78rem, .9vw, .88rem); font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase; margin-bottom: 14px;
    }
    .eyebrow i { font-size: .9em; }
    .section-title { font-size: clamp(2rem, 4.5vw, 3.2rem); font-weight: 900; margin-bottom: 16px; }
    .section-subtitle { color: var(--muted); font-size: clamp(1rem, 1.2vw, 1.12rem); line-height: 1.85; }

    /* =========================================================
       2) BACKGROUND + NAVIGATION
       ========================================================= */
    .site-bg {
      position: fixed; inset: 0; z-index: -3; background: var(--hero-gradient); transition: background .45s ease;
    }
    .site-bg::before {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 68px 68px; mask-image: radial-gradient(circle at 50% 25%, #000 0 44%, transparent 78%);
    }
    .noise {
      position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: .26;
      background: radial-gradient(circle at 20% 30%, var(--glow), transparent 20%), radial-gradient(circle at 80% 70%, var(--glow-2), transparent 26%);
      filter: blur(30px);
    }

    #progress {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%; z-index: 1000;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      box-shadow: 0 0 22px var(--glow);
    }

    .navbar {
      position: fixed; inset: 0 0 auto; z-index: 999; padding: 18px 24px;
      transition: padding var(--transition), background var(--transition), border var(--transition);
    }
    .navbar.scrolled {
      padding: 10px 24px; background: rgba(7, 17, 31, .76); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    }
    html[data-theme="light"] .navbar.scrolled { background: rgba(248, 250, 252, .78); }
    html[data-theme^="light"] .navbar.scrolled { background: color-mix(in srgb, var(--bg), transparent 18%); }
    .nav-inner {
      width: min(1180px, 100%); margin: auto; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    /* Text-based futuristic logo (no images) */
    .logo.brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
      font-family: "Poppins", var(--font-latin);
      font-weight: 950;
      letter-spacing: -0.045em;
      line-height: 1;
      isolation: isolate;
      transition: transform var(--transition), filter var(--transition);
    }

    .brand-mark {
      position: relative;
      width: clamp(42px, 4vw, 52px);
      height: clamp(42px, 4vw, 52px);
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      font-size: clamp(1.1rem, 1.6vw, 1.45rem);
      font-weight: 950;
      letter-spacing: -0.08em;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)) border-box;
      border: 1px solid transparent;
      box-shadow:
        0 0 0 5px color-mix(in srgb, var(--primary), transparent 88%),
        0 14px 38px var(--glow),
        inset 0 1px 0 rgba(255,255,255,.18);
      overflow: hidden;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: -45%;
      background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,.32), transparent 65%);
      transform: translateX(-70%) rotate(18deg);
      transition: transform .65s ease;
    }

    .brand-mark span {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 12px var(--glow));
    }

    .brand-name {
      display: inline-block;
      font-size: clamp(1.28rem, 2vw, 1.85rem);
      font-weight: 950;
      background: linear-gradient(135deg, var(--primary), var(--secondary) 58%, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px var(--glow);
      white-space: nowrap;
    }

    .brand-logo:hover {
      transform: translateY(-2px) scale(1.035);
      filter: drop-shadow(0 0 18px var(--glow));
    }

    .brand-logo:hover .brand-mark::before {
      transform: translateX(70%) rotate(18deg);
    }

    html[data-theme="light"] .brand-mark,
    html[data-theme^="light"] .brand-mark {
      background:
        linear-gradient(rgba(255,255,255,.92), rgba(255,255,255,.92)) padding-box,
        linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)) border-box;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-links a {
      display: inline-flex; padding: 9px 12px; border-radius: var(--radius-full); color: var(--text-2);
      font-size: clamp(.78rem, .9vw, .9rem); font-weight: 700; transition: var(--transition);
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,.075); }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .icon-btn, .lang-btn {
      border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer;
      border-radius: var(--radius-full); transition: var(--transition); backdrop-filter: blur(14px);
    }
    .icon-btn { width: 42px; height: 42px; display: grid; place-items: center; }
    .icon-btn:hover, .lang-btn:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 12px 30px var(--glow); }
    .theme-control, .mode-control { position: relative; }
    .theme-control::after, .mode-control::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      opacity: 0;
      z-index: -1;
      filter: blur(10px);
      transition: opacity var(--transition);
    }
    .theme-control:hover::after, .mode-control:hover::after { opacity: .45; }
    .mode-control.is-light i { color: #F59E0B; }
    .mode-control.is-dark i { color: var(--accent); }
    .language-switcher { display: flex; gap: 5px; padding: 4px; border: 1px solid var(--border); border-radius: var(--radius-full); background: var(--surface); }
    .lang-btn { padding: 7px 11px; font-size: .76rem; font-weight: 900; }
    .lang-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-color: transparent; }
    .mobile-toggle { display: none; }

    /* =========================================================
       3) BUTTONS + SOCIAL ICONS
       ========================================================= */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      min-height: 48px; padding: 13px 22px; border-radius: var(--radius-full); border: 1px solid transparent;
      cursor: pointer; font-weight: 850; font-size: clamp(.92rem, 1vw, 1rem); transition: var(--transition); white-space: nowrap;
    }
    .btn-primary { color: white; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 18px 42px var(--glow); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 24px 60px var(--glow); }
    .btn-whatsapp { background: linear-gradient(135deg, var(--wa), #128C7E); box-shadow: 0 18px 44px rgba(37,211,102,.24); }
    .btn-whatsapp:hover { box-shadow: 0 24px 62px rgba(37,211,102,.34); }
    .btn-outline { color: var(--text); border-color: var(--border); background: rgba(255,255,255,.045); backdrop-filter: blur(14px); }
    .btn-outline:hover { transform: translateY(-3px); border-color: var(--primary); background: rgba(255,255,255,.08); }

    .socials { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .social-link {
      width: 46px; height: 46px; display: grid; place-items: center; border-radius: 50%;
      border: 1px solid var(--border); color: var(--text-2); background: rgba(255,255,255,.045);
      backdrop-filter: blur(12px); transition: var(--transition); font-size: 1.12rem;
    }
    .social-link:hover { transform: translateY(-4px) scale(1.04); color: white; }
    .social-link.whatsapp:hover { background: var(--wa); border-color: var(--wa); box-shadow: 0 18px 40px rgba(37,211,102,.32); }
    .social-link.email:hover { background: var(--email); border-color: var(--email); box-shadow: 0 18px 40px rgba(56,189,248,.28); }
    .social-link.facebook:hover { background: var(--facebook); border-color: var(--facebook); box-shadow: 0 18px 40px rgba(24,119,242,.28); }

    /* =========================================================
       4) HERO SECTION + PERFECT CIRCULAR PROFILE IMAGE
       ========================================================= */
    .hero {
      min-height: 100vh; display: grid; align-items: center; padding: clamp(112px, 13vw, 160px) 24px clamp(70px, 9vw, 110px);
      isolation: isolate;
    }
    .hero-grid {
      width: min(1180px, 100%); margin: auto; display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(300px, .96fr);
      gap: clamp(38px, 6vw, 96px); align-items: center; justify-items: center;
    }
    .hero-content { position: relative; z-index: 3; max-width: 670px; }
    .availability {
      display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; margin-bottom: 24px;
      color: var(--primary); background: rgba(255,255,255,.055); border: 1px solid var(--border); border-radius: var(--radius-full);
      font-size: clamp(.78rem, .9vw, .9rem); font-weight: 800;
    }
    .availability .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--wa); box-shadow: 0 0 0 7px rgba(37,211,102,.12); animation: pulse 1.9s ease-in-out infinite; }
    .hero h1 { font-size: clamp(2.65rem, 6vw, 5.35rem); font-weight: 950; line-height: .98; margin-bottom: 22px; }
    .hero-subtitle { color: var(--text-2); font-size: clamp(1.05rem, 1.55vw, 1.35rem); font-weight: 800; margin-bottom: 14px; }
    .hero-description { color: var(--muted); font-size: clamp(.98rem, 1.12vw, 1.1rem); max-width: 58ch; line-height: 1.9; margin-bottom: 34px; }
    .hero-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 34px; }
    .hero-social-title { color: var(--muted); font-size: .86rem; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .1em; }

    .hero-visual { position: relative; z-index: 2; width: min(440px, 100%); aspect-ratio: 1 / 1; display: grid; place-items: center; }
    .avatar-orbit {
      position: absolute; inset: -12px; border-radius: 50%; border: 1px solid rgba(255,255,255,.15);
      background: conic-gradient(from 180deg, transparent, var(--primary), var(--secondary), var(--accent), transparent);
      filter: drop-shadow(0 0 34px var(--glow)); animation: rotate 13s linear infinite; opacity: .85;
    }
    .avatar-ring {
      position: relative; width: clamp(260px, 36vw, 410px); height: clamp(260px, 36vw, 410px);
      border-radius: 50%; padding: 5px; overflow: hidden; background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      box-shadow: 0 0 0 10px rgba(255,255,255,.035), 0 0 65px var(--glow), 0 30px 90px rgba(0,0,0,.45);
      animation: float 6s ease-in-out infinite;
    }
    .avatar-ring::before {
      content: ""; position: absolute; inset: -30%; border-radius: inherit;
      background: radial-gradient(circle, rgba(255,255,255,.22), transparent 45%); transform: translate(-36%, -36%);
      pointer-events: none; z-index: 2;
    }
    .profile-image {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover; object-position: center;
      background: transparent; display: block; position: relative; z-index: 1;
    }
    .floating-card {
      position: absolute; z-index: 4; display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      border-radius: var(--radius-md); background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft); color: var(--text); font-weight: 850; font-size: clamp(.78rem, .9vw, .9rem);
    }
    .floating-card i { color: var(--primary); }
    .card-top { top: 8%; right: -5%; }
    .card-bottom { bottom: 8%; left: -5%; }
    [dir="rtl"] .card-top { right: auto; left: -5%; }
    [dir="rtl"] .card-bottom { left: auto; right: -5%; }

    /* =========================================================
       5) CARDS, SECTIONS, LAYOUTS
       ========================================================= */
    .stats {
      width: min(1180px, 100%); margin: clamp(42px, 6vw, 74px) auto 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    }
    .stat-card, .glass-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft); transition: var(--transition); overflow: hidden;
    }
    .stat-card { padding: 22px 18px; text-align: center; }
    .stat-card:hover, .glass-card:hover { transform: translateY(-7px); border-color: color-mix(in srgb, var(--primary), transparent 45%); box-shadow: 0 28px 90px var(--glow); }
    .stat-value { font-size: clamp(1.8rem, 3vw, 2.55rem); line-height: 1; font-weight: 950; color: var(--primary); }
    .stat-label { margin-top: 8px; color: var(--muted); font-size: clamp(.78rem, .9vw, .9rem); font-weight: 750; }

    .about-grid, .contact-grid { display: grid; grid-template-columns: .92fr 1.08fr; gap: clamp(28px, 5vw, 72px); align-items: center; }
    .about-panel { padding: clamp(26px, 4vw, 42px); }
    .feature-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 28px; }
    .feature-item { display: flex; align-items: center; gap: 11px; color: var(--text-2); font-weight: 750; line-height: 1.5; }
    .feature-item i { color: var(--wa); flex: 0 0 auto; }
    [dir="rtl"] .feature-item { flex-direction: row-reverse; justify-content: flex-end; }

    .profile-mini {

    .premium-service-text { position: relative; z-index: 1; color: var(--muted); font-size: clamp(.88rem, .98vw, .96rem); line-height: 1.78; }

    /* Animations kept smooth and accessible */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .75s ease, transform .75s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.75); opacity: .6; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-13px); } }
    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes breathe { 0%,100% { box-shadow: 0 18px 46px rgba(37,211,102,.34); } 50% { box-shadow: 0 18px 68px rgba(37,211,102,.56); } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: .001ms !important; }
      .reveal { opacity: 1; transform: none; }
    }
  

    /* Email fallback: mailto needs a configured email app, so copy button guarantees access */
    .btn-email:hover { color: white; background: linear-gradient(135deg, var(--email), var(--primary)); border-color: transparent; box-shadow: 0 18px 42px rgba(56,189,248,.25); }
    .copy-email-btn {
      width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      min-height: 48px; padding: 12px 16px; border-radius: var(--radius-md);
      border: 1px solid rgba(56,189,248,.35); background: rgba(56,189,248,.10); color: var(--text);
      cursor: pointer; font-weight: 900; transition: var(--transition);
    }
    .copy-email-btn:hover { transform: translateY(-3px); background: rgba(56,189,248,.16); box-shadow: 0 18px 44px rgba(56,189,248,.18); }
    .email-toast {
      position: fixed; left: 50%; bottom: 26px; transform: translate(-50%, 20px); z-index: 1200;
      padding: 12px 18px; border-radius: var(--radius-full); background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border); box-shadow: var(--shadow-soft); backdrop-filter: blur(18px);
      opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; font-weight: 850;
    }
    .email-toast.show { opacity: 1; transform: translate(-50%, 0); }
    [dir="rtl"] .email-toast { direction: rtl; }



    /* Universal interactivity: ripple, active states, accessible focus */
    .btn, .icon-btn, .lang-btn, .social-link, .contact-link, .copy-email-btn,
    .premium-service-card, .project-card, .skill-pill, .brand-logo {
      -webkit-tap-highlight-color: transparent;
    }

    .btn, .icon-btn, .lang-btn, .copy-email-btn, .premium-service-card, .project-card, .skill-pill {
      position: relative;
      overflow: hidden;
    }

    .btn:active, .icon-btn:active, .lang-btn:active, .copy-email-btn:active,
    .premium-service-card:active, .project-card:active, .skill-pill:active {
      transform: translateY(1px) scale(.985);
    }

    .btn:focus-visible, .icon-btn:focus-visible, .lang-btn:focus-visible, .social-link:focus-visible,
    .contact-link:focus-visible, .copy-email-btn:focus-visible, .premium-service-card:focus-visible,
    .project-card:focus-visible, .skill-pill:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary), transparent 72%), 0 20px 56px var(--glow);
    }

    .premium-service-card, .project-card, .skill-pill { cursor: pointer; }

    .project-card::after, .premium-service-card::after {
      content: "\f061";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      position: absolute;
      right: 22px;
      bottom: 20px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--primary);
      background: color-mix(in srgb, var(--primary), transparent 88%);
      border: 1px solid color-mix(in srgb, var(--primary), transparent 70%);
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity var(--transition), transform var(--transition), background var(--transition), color var(--transition);
      z-index: 2;
    }

    [dir="rtl"] .project-card::after,
    [dir="rtl"] .premium-service-card::after {
      content: "\f060";
      right: auto;
      left: 22px;
      transform: translateX(8px);
    }

    .project-card:hover::after, .premium-service-card:hover::after,
    .project-card:focus-visible::after, .premium-service-card:focus-visible::after {
      opacity: 1;
      transform: translateX(0);
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    .ripple-effect {
      position: absolute;
      border-radius: 999px;
      transform: scale(0);
      background: radial-gradient(circle, rgba(255,255,255,.45), rgba(255,255,255,.16) 42%, transparent 70%);
      pointer-events: none;
      animation: ripple .65s ease-out forwards;
      z-index: 5;
      mix-blend-mode: screen;
    }

    @keyframes ripple {
      to { transform: scale(2.8); opacity: 0; }
    }
  

    /* =========================================================
       FUTURISTIC ANIMATED BACKGROUND - CSS + JS only, no images
       ========================================================= */
    .site-bg {
      background:
        radial-gradient(circle at 18% 20%, color-mix(in srgb, var(--primary), transparent 72%), transparent 34%),
        radial-gradient(circle at 84% 18%, color-mix(in srgb, var(--secondary), transparent 72%), transparent 36%),
        radial-gradient(circle at 50% 82%, color-mix(in srgb, var(--accent), transparent 78%), transparent 34%),
        linear-gradient(-45deg, var(--bg), var(--bg-2), color-mix(in srgb, var(--primary), var(--bg) 84%), color-mix(in srgb, var(--secondary), var(--bg) 84%), var(--bg));
      background-size: 140% 140%, 150% 150%, 145% 145%, 400% 400%;
      animation: gradientShift 24s ease infinite;
    }

    .aurora-layer,
    .particle-canvas,
    .code-background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-layer {
      z-index: -2;
      filter: blur(10px);
      opacity: .82;
      mix-blend-mode: screen;
    }

    .aurora-orb {
      position: absolute;
      width: clamp(220px, 32vw, 520px);
      height: clamp(220px, 32vw, 520px);
      border-radius: 999px;
      background: radial-gradient(circle, var(--orb-color), transparent 68%);
      opacity: .36;
      filter: blur(28px);
      animation: orbFloat 18s ease-in-out infinite alternate;
      will-change: transform;
    }

    .aurora-orb:nth-child(1) { --orb-color: var(--primary); left: -8%; top: 12%; animation-duration: 20s; }
    .aurora-orb:nth-child(2) { --orb-color: var(--secondary); right: -10%; top: 8%; animation-duration: 24s; animation-delay: -6s; }
    .aurora-orb:nth-child(3) { --orb-color: var(--accent); left: 28%; bottom: -18%; animation-duration: 26s; animation-delay: -10s; }

    .particle-canvas {
      z-index: -1;
      opacity: .42;
      mix-blend-mode: screen;
    }

    .code-background {
      z-index: -1;
      opacity: .105;
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 78%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 78%, transparent 100%);
    }

    .code-line {
      position: absolute;
      color: color-mix(in srgb, var(--accent), #ffffff 12%);
      font-family: "SFMono-Regular", "Cascadia Code", "Fira Code", Consolas, monospace;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: .02em;
      text-shadow: 0 0 14px color-mix(in srgb, var(--accent), transparent 38%);
      animation: codeDrift linear infinite;
      will-change: transform, opacity;
      user-select: none;
    }

    html[data-theme="light"] .aurora-layer,
    html[data-theme^="light"] .aurora-layer { opacity: .48; mix-blend-mode: multiply; }
    html[data-theme="light"] .particle-canvas,
    html[data-theme^="light"] .particle-canvas { opacity: .30; mix-blend-mode: multiply; }
    html[data-theme="light"] .code-background,
    html[data-theme^="light"] .code-background { opacity: .075; }

    @keyframes gradientShift {
      0% { background-position: 0% 50%, 100% 0%, 50% 100%, 0% 50%; }
      50% { background-position: 100% 50%, 0% 100%, 80% 0%, 100% 50%; }
      100% { background-position: 0% 50%, 100% 0%, 50% 100%, 0% 50%; }
    }

    @keyframes orbFloat {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(7vw, -5vh, 0) scale(1.08); }
      100% { transform: translate3d(-4vw, 6vh, 0) scale(.96); }
    }

    @keyframes codeDrift {
      0% { transform: translate3d(0, -18vh, 0); opacity: 0; }
      12% { opacity: 1; }
      82% { opacity: .85; }
      100% { transform: translate3d(0, 118vh, 0); opacity: 0; }
    }

    @media (max-width: 720px) {
      .particle-canvas { opacity: .30; }

    function initParticleBackground() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const canvas = document.getElementById('particleCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d', { alpha: true });
      let width = 0, height = 0, dpr = 1, particles = [];

      function cssColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#38BDF8';
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const count = Math.min(width < 720 ? 34 : 74, Math.max(28, Math.floor(width / 22)));
        particles = Array.from({ length: count }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 2.2 + .7,
          vx: (Math.random() - .5) * .26,
          vy: (Math.random() - .5) * .26,
          phase: Math.random() * Math.PI * 2
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        const primary = cssColor('--primary');
        const secondary = cssColor('--secondary');
        const accent = cssColor('--accent');

        particles.forEach((p, i) => {
          p.phase += .012;
          p.x += p.vx + Math.cos(p.phase) * .045;
          p.y += p.vy + Math.sin(p.phase) * .045;
          if (p.x < -20) p.x = width + 20;
          if (p.x > width + 20) p.x = -20;
          if (p.y < -20) p.y = height + 20;
          if (p.y > height + 20) p.y = -20;

          ctx.beginPath();
          ctx.fillStyle = i % 3 === 0 ? primary : i % 3 === 1 ? secondary : accent;
          ctx.globalAlpha = .22 + Math.sin(p.phase) * .08;
          ctx.shadowBlur = 18;
          ctx.shadowColor = ctx.fillStyle;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.shadowBlur = 0;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i], b = particles[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 118) {
              ctx.globalAlpha = (1 - dist / 118) * .11;
              ctx.strokeStyle = i % 2 ? primary : accent;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }

      resize();
      draw();
      window.addEventListener('resize', resize, { passive: true });
    }
